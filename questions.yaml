        text: "Fällt es Ihnen schwer, sich in neuen (sozialen) Situationen zurechtzufinden (z. B., wenn Sie auf neue Personen treffen oder in ein Krankenhaus müssen, in dem Sie noch nie waren, oder erstmalig zu einem bestimmten Amt müssen)?"
