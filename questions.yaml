  - title: "Kapitel 6: Berichte von Angehörigen"
    description: |
      Eine Autismus-Spektrum-Störung beginnt in der frühsten Kindheit bzw. mit der Geburt und besteht über die gesamte Lebensdauer hinweg. Daher muss zweifelsfrei festgestellt werden, dass die vorliegende Gesamtsymptomatik nicht erst im Laufe des späteren Lebens entstanden ist, während in der frühsten Kindheit gar keine Einschränkungen/Auffälligkeiten vorhanden waren. Selbstverständlich können die Symptome in der (frühen) Kindheit schwächer oder weniger auffällig gewesen sein. Dennoch wäre es sehr verwunderlich, wenn nicht zumindest Ansätze bereits zu erkennen waren.

      Falls das Störungsbild erst viel später „aus dem Nichts" entsteht, so handelt es sich sehr wahrscheinlich eher um eine andere Störung oder um mehrere Störungsbilder, die gleichzeitig bestehen und im Laufe des Lebens erworben wurden. So kann z. B. eine Kombination aus Angststörung, Posttraumatischer Belastungsstörung, Sozialphobie, Zwangsstörung und/oder Persönlichkeitsstörung in einigen Fällen wie Autismus aussehen, ohne Autismus zu sein. Obwohl diese Kombination von Störungsbildern dann wie Autismus aussehen könnte, müsste diese Störungskombination von einer Autismus-Spektrum-Störung unterschieden werden. Beim Vorliegen einer solchen oder ähnlichen Kombination verschiedener Störungsbilder wären nämlich in aller Regel andere Unterstützungs- und Therapiemaßnahmen angeraten, als es bei einer Autismus-Spektrum-Störung der Fall sein würde. Deshalb muss möglichst zweifelsfrei festgestellt werden, dass es sich tatsächlich um Autismus handelt.

      Neben den Selbstbeobachtungen, Selbstbeschreibungen sowie Selbsteinschätzungen sind für eine aussagekräftige Diagnostik in aller Regel Einschätzungen von weiteren Personen notwendig. Es ist daher sinnvoll, wenn Sie die folgenden Seiten nutzen, um Fremdeinschätzungen über Ihr Verhalten einzuholen (insofern dies möglich ist). Diese Fremdeinschätzungen sollten im Optimalfall durch Angehörige (Freund:innen, Verwandte, Arbeitskolleg:innen, Lebenspartner:innen etc.) erfolgen, die Sie möglichst gut und lange kennen. Optimalerweise kennen diese Personen Sie bereits seit der (frühsten) Kindheit und können daher verlässliche Informationen zu Ihren ersten Jahren auf dieser Welt machen. Es gibt sogar Diagnostiker:innen, die nur dann eine Autismus-Diagnose vergeben, wenn Kindheitsberichte vorliegen.

      Sollten keine Kontakte zu Personen aus der Kindheit (z. B. den Eltern) bestehen, so können alternativ auch Zeugnisse, Kinderfotos oder andere Beweismaterialien gesammelt werden, die Sie (als Kopie!) diesem Heft beifügen können. Häufig können auch diesen Unterlagen Hinweise auf das Vorliegen/Nicht-Vorliegen einer Autismus-Spektrum-Störung entnommen werden.

      Auf den folgenden Seiten wird Ihnen Platz geboten, um von vier Personen Eindrücke über Ihr Verhalten und Ihre Auffälligkeiten zu dokumentieren. Vergessen Sie nicht, dass die jeweilige Person ihren Bericht unterschreiben sollte, um auf diese Weise zu bestätigen, dass die getroffenen Aussagen wahr sind (ein entsprechendes Feld für eine Unterschrift ist am Ende des Bogens stets vorhanden).

      Selbst wenn Sie keinen Kontakt zu Personen aus Ihrer Kindheit oder Jugend haben sollten, so können Berichte von nahen Angehörigen oder Personen, die Sie schon seit mehreren Jahren begleiten / kennen, für eine Diagnostik sehr wertvoll sein. Sie sollten diese Personen dann darum bitten, diese Seiten mit Ihnen zusammen auszufüllen.

      Gerne können Angehörige auch die in Kapitel 5 dargestellten Testverfahren ausfüllen und Ihre Auffälligkeiten auf diese Weise „von außen" bewerten. So würden dann einmal die Testergebnisse aus Ihrer Perspektive und die Testergebnisse aus der Perspektive einer anderen Person über Sie vorliegen. Wenn Sie selbst und andere Personen zu den gleichen oder zumindest zu ähnlichen Ergebnissen kommen, so spricht dies für eine gewisse Validität der Testergebnisse.
