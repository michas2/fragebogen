  - title: "Kapitel 4: Weitere Auffälligkeiten mit Bezug zu Autismus"
    description: "In diesem Kapitel geht es um weitere Auffälligkeiten und Besonderheiten, die von der Wissenschaft regelmäßig mit Autismus in Verbindung gebracht werden. Die Auffälligkeiten, die in diesem Kapitel thematisiert werden, stellen überwiegend keine direkten Diagnosekriterien für Autismus dar. Dennoch können Notizen zu diesen Thematiken helfen, zentrale Informationen für einen Diagnostikprozess bereitzustellen. Außerdem können Sie auf diese Weise über sich und Ihr Verhalten vertiefend reflektieren und Ihren Unterstützungsbedarf womöglich besser einschätzen."
    questions:
      - id: kap4_reizfilter
        text: "Haben Sie das Gefühl, dass alle Reize (z. B. Lichter, Geräusche, Gerüche) aus der Umwelt ungefiltert auf Sie einwirken (= Haben Sie eine Reizfilterstörung)?"
