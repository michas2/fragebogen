title: "Autismus-Diagnostik Workbook"
sections:
  - title: "Kapitel 1: Einleitung und Anleitung zur Arbeit mit diesem Buch"
    description: |
      Eine aussagekräftige Autismus-Diagnostik beruht auf einer fundierten und umfassenden Sammlung von Informationen über die jeweilige Person: Neben dem Verhalten müssen auch das innere Erleben sowie der individuelle Werdegang im Detail betrachtet werden. Also ist nicht nur die aktuelle Situation zu analysieren, sondern auch die Vergangenheit zu berücksichtigen. Denn bei Autismus handelt es sich nach der ICD-11 (WHO, 2025) um eine lebenslange, neuronale Entwicklungsstörung, die bereits in der frühsten Kindheit ihren Anfang nimmt.

      Das Ziel dieses Buches ist es, bei ebendieser Informationssammlung behilflich zu sein. Vielen autistischen Menschen fällt es nämlich schwer (z. B. aufgrund von Defiziten in den exekutiven Funktionen), eine systematische Zusammenstellung aussagekräftiger Unterlagen anzufertigen. Jedoch ist dies für eine Autismus-Diagnostik prinzipiell notwendig – im schlimmsten Fall kann es sogar zu einem falschen Ergebnis kommen, wenn nicht genügend Informationen vorliegen. Dies gilt es zu vermeiden.

      So bietet dieses Buch Ihnen den Raum, Notizen über Ihren bisherigen Lebenslauf, Ihre Person, Ihr Empfinden sowie Ihre Verhaltensweisen und Auffälligkeiten zu erstellen. Dies soll es Ihnen erleichtern, die typischen Fragen zu beantworten, die man Ihnen im Rahmen einer Diagnostik ohnehin stellen wird.

      Um keine Missverständnisse aufkommen zu lassen: Dieses Buch ersetzt keine Diagnostik und kann sowie will sie auch nicht ersetzen oder durchführen. Eine ausführliche und fundierte Informationssammlung kann einen Diagnoseprozess jedoch womöglich beschleunigen und dem Entstehen von Fehlern entgegenwirken. In der Hoffnung, (autistischen) Menschen auf ihrem Weg zu helfen, wurde dieses Buch verfasst.

      Soziale Interaktion stellt für viele Autist:innen eine große Herausforderung dar und ein Diagnostikgespräch ist nichts anderes als eine solche soziale Interaktion. Deshalb ist es nur verständlich, wenn Sie sich dann ein Hilfsmittel (wie dieses Workbook) mit sich führen möchten. In ihm werden sich nämlich zahlreiche wichtige Details befinden, sobald Sie es durchgearbeitet haben.

      Dieses Workbook wurde so verfasst, dass Sie es nicht „an einem Stück" durcharbeiten müssen. Sie können es jederzeit weglegen und die Bearbeitung zu einem beliebigen Zeitpunkt fortsetzen. Der Aufbau dieses Buches folgt einem einheitlichen Muster: thematisch sortiert finden Sie zahlreiche Fragen (beispielsweise zu Ihrer Person, zu Ihrem Verhalten oder zu Ihren Auffälligkeiten) und die meisten dieser Fragen sollen Sie zunächst entweder mit „Ja" oder „Nein" beantworten. Dieses Antwortformat soll Sie dazu anregen, sich vertiefend zu dem jeweiligen Aspekt Gedanken zu machen.

      Somit soll das dichotome Antwortformat (Ja/Nein) Sie nicht einengen, sondern unterstützen. Weil es sogar vollkommen verständlich ist, dass Ihre eigentliche Antwort in vielen Fällen vermutlich komplexer ausfallen wird, gibt es fast immer die Möglichkeit, weitere Anmerkungen zu notieren. Dazu werden Ihnen Freitextbereiche zur Verfügung gestellt.

      In diesem Buch sind die Fragen in aller Regel so formuliert, dass die Antwort „Ja" mit Blick auf die Diagnosekriterien für Autismus und/oder die wissenschaftliche Evidenz zum Thema Autismus ein Indiz dafür darstellt, dass Autismus tendenziell vorliegen könnte.

      Bitte arbeiten Sie nur dann mit diesem Workbook, wenn Sie sich psychisch sowie emotional dazu in der Lage fühlen.
    questions: []

  - title: "Kapitel 2: Allgemeine Rahmeninformationen"
    description: "In diesem Kapitel geht es darum, dass Sie zentrale Rahmeninformationen zu Ihrer Person erfassen. Solche werden im Kontext einer Diagnostik in aller Regel erfragt. Während der Diagnostiksituation kann es jedoch vorkommen, dass Sie sogar vermeintlich „einfache\" Details über sich selbst vergessen oder dass Sie Probleme haben, mit einer Person, die Ihnen fremd ist, zu sprechen. Die Notizen, die Sie in diesem Kapitel anfertigen, können Ihnen in einer Diagnostiksituation dann als „Spicker\" und Orientierungshilfe dienen."
    questions:
      - id: kap2_name
        text: "Das ist Ihr Name (Vorname/Vornamen und Nachname/Nachnamen):"
        type: text
      - id: kap2_geburtsdatum
        text: "An diesem Tag wurden Sie geboren (Datum: Tag/Monat/Jahr):"
        type: text
      - id: kap2_geschlecht
        text: "Das ist Ihr Geschlecht:"
        type: choice
        options:
          - "weiblich"
          - "männlich"
          - "divers"
          - "unzutreffend"
      - id: kap2_geburtsstadt
        text: "In dieser Stadt wurden Sie geboren:"
        type: text
      - id: kap2_geburtsland
        text: "In diesem Land wurden Sie geboren:"
        type: text
      - id: kap2_muttersprache
        text: "Dies ist Ihre Muttersprache (die Sprache, die Sie zuerst erlernt haben):"
        type: text
      - id: kap2_sprachen_zuhause
        text: "Diese Sprachen wurden in Ihrer Kindheit bei Ihnen zu Hause gesprochen:"
        type: text
      - id: kap2_sprachen_beherrschen
        text: "Diese Sprachen beherrschen Sie (gerne können Sie auch angeben, wie gut Sie welche Sprachen sprechen):"
        type: textarea
      - id: kap2_verhaeltnis_eltern_kindheit
        text: "Hier können Sie Ihr Verhältnis zu Ihren Eltern in Ihrer Kindheit beschreiben:"
        type: textarea
      - id: kap2_verhaeltnis_eltern_jugend
        text: "Hier können Sie Ihr Verhältnis zu Ihren Eltern in Ihrer Jugend beschreiben:"
        type: textarea
      - id: kap2_verhaeltnis_eltern_heute
        text: "Hier können Sie Ihr heutiges Verhältnis zu Ihren Eltern beschreiben:"
        type: textarea
      - id: kap2_kontakt_eltern
        text: "Haben Sie heutzutage noch Kontakt zu Ihren Eltern?"
        type: yesno
      - id: kap2_freunde_kindheit
        text: "Hatten Sie in Ihrer Kindheit Freund:innen?"
        type: yesno
      - id: kap2_freunde_kindheit_gewollt
        text: "Wollten Sie in Ihrer Kindheit Freund:innen haben?"
        type: yesno
      - id: kap2_anmerkungen_freundschaften_kindheit
        text: "Hier können Sie Anmerkungen zu Ihren Freundschaften in Ihrer Kindheit verfassen:"
        type: textarea
      - id: kap2_freunde_jugend
        text: "Hatten Sie in Ihrer Jugend Freund:innen?"
        type: yesno
      - id: kap2_freunde_jugend_gewollt
        text: "Wollten Sie in Ihrer Jugend Freund:innen haben?"
        type: yesno
      - id: kap2_anmerkungen_freundschaften_jugend
        text: "Hier können Sie Anmerkungen zu Ihren Freundschaften in Ihrer Jugend verfassen:"
        type: textarea
      - id: kap2_freunde_heute
        text: "Haben Sie heutzutage Freund:innen?"
        type: yesno
      - id: kap2_freunde_heute_gewollt
        text: "Wollen Sie heutzutage Freund:innen haben?"
        type: yesno
      - id: kap2_anmerkungen_freundschaften_heute
        text: "Hier können Sie Anmerkungen zu Ihren heutigen Freundschaften verfassen:"
        type: textarea
      - id: kap2_stoerungen_diagnostiziert
        text: "Haben Sie bereits bestimmte Störungen/Krankheiten diagnostiziert bekommen?"
        type: yesno
      - id: kap2_stoerungen_welche
        text: "Hier können Sie zusammenfassen, welche Krankheiten/Störungen bei Ihnen bereits diagnostiziert wurden:"
        type: textarea
      - id: kap2_weitere_stoerungen
        text: "Vermuten Sie weitere Störungen/Krankheiten bei sich, die bisher nicht diagnostiziert wurden?"
        type: yesno
      - id: kap2_weitere_stoerungen_welche
        text: "Hier können Sie darstellen, welche Störungen/Krankheiten Sie außerdem bei sich vermuten (und Sie können begründen, warum Sie dies vermuten):"
        type: textarea
      - id: kap2_falschdiagnosen
        text: "Vermuten Sie, dass einige Störungen/Krankheiten, die bei Ihnen bereits diagnostiziert wurden, eigentlich Falschdiagnosen sind?"
        type: yesno
      - id: kap2_falschdiagnosen_welche
        text: "Hier können Sie darstellen, welche bei Ihnen diagnostizierten Störungen/Krankheiten aus Ihrer Sicht vermutlich Falschdiagnosen sind (und Sie können auch begründen, warum Sie dies vermuten):"
        type: textarea
      - id: kap2_missverstanden
        text: "Fühlen Sie sich von anderen Personen öfters missverstanden?"
        type: yesno
      - id: kap2_missverstanden_details
        text: "Hier können Sie weitere Angaben dazu machen, ob/inwiefern (z. B. wann und wo) Sie sich missverstanden fühlen:"
        type: textarea
      - id: kap2_mobbing
        text: "Haben Sie während Ihrer Schulzeit, Ihrer Ausbildung, Ihres Studiums, Ihrer Arbeitstätigkeit oder in einem anderen Kontext Mobbing erfahren?"
        type: yesno
      - id: kap2_mobbing_anmerkungen
        text: "Hier können Sie Anmerkungen zu Ihren Mobbingerfahrungen verfassen:"
        type: textarea
      - id: kap2_schulabschluss
        text: "Haben Sie einen Schulabschluss?"
        type: yesno
      - id: kap2_schulabschluss_anmerkungen
        text: "Hier können Sie Anmerkungen zum Vorliegen/Nicht-Vorliegen eines Schulabschlusses verfassen:"
        type: textarea
      - id: kap2_berufsausbildung
        text: "Haben Sie eine abgeschlossene Berufsausbildung?"
        type: yesno
      - id: kap2_berufsausbildung_anmerkungen
        text: "Hier können Sie Anmerkungen zum Vorliegen/Nicht-Vorliegen einer abgeschlossenen Berufsausbildung verfassen:"
        type: textarea
      - id: kap2_studium
        text: "Haben Sie ein Studium abgeschlossen?"
        type: yesno
      - id: kap2_studium_anmerkungen
        text: "Hier können Sie Anmerkungen zum Vorliegen/Nicht-Vorliegen eines abgeschlossenen Studiums verfassen:"
        type: textarea
      - id: kap2_bildungsweg_zufrieden
        text: "Sind Sie mit Ihrem bisherigen Bildungsweg zufrieden?"
        type: yesno
      - id: kap2_bildungsweg_anmerkungen
        text: "Hier können Sie weitere Anmerkungen zu Ihrem Bildungsweg verfassen:"
        type: textarea
      - id: kap2_beruf_aktuell
        text: "Gehen Sie aktuell einem Beruf nach? (Bei Arbeitslosigkeit, Rente o. Ä. kreuzen Sie bitte „Nein\" an)"
        type: yesno
      - id: kap2_berufliche_situation
        text: "Hier können Sie Ihre berufliche Situation näher erläutern (ggf. auch Aspekte aus Ihrer Vergangenheit):"
        type: textarea
      - id: kap2_familie_autismus
        text: "Gibt es in Ihrer Familie mindestens eine Person mit einer gesicherten Autismusdiagnose?"
        type: yesno
      - id: kap2_familie_autismus_vermutet
        text: "Gibt es in Ihrer Familie Personen, bei denen Sie Autismus vermuten?"
        type: yesno
      - id: kap2_elternteil_ueber_30
        text: "War mindestens eines Ihrer Elternteile bei Ihrer Geburt schon über 30 Jahre alt?"
        type: yesno
      - id: kap2_elternteil_ueber_40
        text: "War mindestens eines Ihrer Elternteile bei Ihrer Geburt schon über 40 Jahre alt?"
        type: yesno
      - id: kap2_familie_sonstiges
        text: "Falls Sie noch etwas zu Ihrer Familie erwähnen möchten, können Sie dies hier tun:"
        type: textarea
      - id: kap2_grundlegendes_person
        text: "Insofern Sie etwas Grundlegendes zu Ihrer Person mitteilen möchten, das Sie bisher nicht mitgeteilt haben, können Sie dies an dieser Stelle nachholen:"
        type: textarea
      - id: kap2_wichtig_diagnostik
        text: "Falls es etwas gibt, das Ihnen sehr wichtig ist und das Sie während einer Diagnostik auf jeden Fall sagen oder fragen möchten, können Sie dies an dieser Stelle notieren:"
        type: textarea

  - title: "Kapitel 3.1: Zentrale Auffälligkeiten in der sozialen Interaktion und Kommunikation"
    description: "In diesem Kapitel sollen Sie einschätzen, ob spezifische Aspekte auf Sie zutreffen (Ja/Nein). Des Weiteren können Sie ergänzende Anmerkungen verfassen."
    questions:
      - id: kap31_blickkontakt
        text: "Fällt es Ihnen schwer, in der Art Blickkontakt zu halten, wie er von anderen Personen gewünscht oder als angemessen empfunden wird? (Hilfestellung: Hat Ihnen bereits mindestens eine Person gesagt, dass Sie sie „nicht richtig\" anschauen würden?)"
        type: yesno
      - id: kap31_anstarren
        text: "Neigen Sie dazu, andere Personen anzustarren? (zu intensiver Blickkontakt)"
        type: yesno
      - id: kap31_blickkontakt_vermeiden
        text: "Neigen Sie dazu, den Blickkontakt mit anderen Menschen zu vermeiden?"
        type: yesno
      - id: kap31_blickkontakt_auffaellig
        text: "Wurden Sie schon darauf angesprochen, dass Ihr Blickkontakt „auffällig\" oder „nicht korrekt\" sei (z. B.: „Guck doch nicht so böse!\")?"
        type: yesno
      - id: kap31_blickkontakt_anmerkungen
        text: "Hier können Sie Anmerkungen zum Thema Blickkontakt verfassen:"
        type: textarea
      - id: kap31_gestik_verstehen
        text: "Fällt es Ihnen leicht, die Gestik, Mimik (= Gesichtsausdrücke) oder Körpersprache anderer Personen zu verstehen?"
        type: yesno
      - id: kap31_gestik_verstehen_anmerkungen
        text: "Hier können Sie Anmerkungen dazu verfassen, ob/inwiefern Sie die von anderen Personen eingesetzte Gestik, Mimik oder Körpersprache (nicht) verstehen können:"
        type: textarea
      - id: kap31_gestik_benutzen
        text: "Fällt es Ihnen leicht, Gestik, Mimik (= Gesichtsausdrücke) oder Körpersprache in sozialen Situationen korrekt zu benutzen?"
        type: yesno
      - id: kap31_gestik_benutzen_anmerkungen
        text: "Hier können Sie Anmerkungen zum Einsatz Ihrer eigenen Gestik, Mimik oder Körpersprache verfassen:"
        type: textarea
      - id: kap31_grimmig
        text: "Sagen Ihnen manchmal andere Personen, dass Sie nicht so grimmig o. Ä. schauen sollen, obwohl Sie sich gut fühlen / Sie zufrieden sind?"
        type: yesno
      - id: kap31_grimmig_anmerkungen
        text: "Hier können Sie Anmerkungen zu dieser Thematik/zu solchen Erlebnissen verfassen:"
        type: textarea
      - id: kap31_freundschaften_knuepfen
        text: "Fällt es Ihnen leicht, neue Freundschaften zu knüpfen?"
        type: yesno
      - id: kap31_freundschaften_knuepfen_anmerkungen
        text: "Hier können Sie Anmerkungen zu Ihren Erfahrungen beim Knüpfen neuer Freundschaften verfassen:"
        type: textarea
      - id: kap31_freundschaften_aufrechterhalten
        text: "Fällt es Ihnen leicht, Freundschaften aufrechtzuerhalten?"
        type: yesno
      - id: kap31_freundschaften_aufrechterhalten_anmerkungen
        text: "Hier können Sie Anmerkungen zu Ihren Erfahrungen beim Aufrechterhalten von Freundschaften aufschreiben:"
        type: textarea
      - id: kap31_verstellen
        text: "Haben Sie das Gefühl, sich ständig verstellen zu müssen, damit andere Sie mögen/für sympathisch halten/„nicht schrecklich\" finden? (Alternative Formulierung: Haben Sie das Gefühl, dass andere Menschen Sie nicht mögen würden, wenn Sie sich so zeigen oder verhalten würden, wie Sie wirklich sind?)"
        type: yesno
      - id: kap31_verstellen_anmerkungen
        text: "Hier können Sie vermerken, ob/inwiefern Sie sich verstellen müssen:"
        type: textarea
      - id: kap31_soziale_situationen_anstrengend
        text: "Sind soziale Situationen für Sie sehr anstrengend? Kosten soziale Situationen Sie sehr viel Energie/Kraft?"
        type: yesno
      - id: kap31_soziale_situationen_anmerkungen
        text: "Hier können Sie vermerken, ob/inwiefern Ihnen soziale Situationen anstrengend vorkommen:"
        type: textarea
      - id: kap31_mehr_freundschaften
        text: "Möchten Sie gerne (mehr) Freundschaften haben?"
        type: yesno
      - id: kap31_mehr_freundschaften_anmerkungen
        text: "Hier können Sie vermerken, ob Sie gerne (mehr) Freundschaften haben möchten bzw. wo das Problem aus Ihrer Sicht liegt:"
        type: textarea
      - id: kap31_partnerschaft
        text: "Möchten Sie gerne eine feste Partnerschaft/(romantische) Liebesbeziehung führen?"
        type: yesno
      - id: kap31_partnerschaft_anmerkungen
        text: "Hier können Sie Ihre Anmerkungen dazu verfassen, ob/inwiefern Sie gerne eine feste Partnerschaft/Liebesbeziehung führen möchten:"
        type: textarea
      - id: kap31_hierarchien
        text: "Haben Sie Probleme damit, Hierarchien (z. B. auf der Arbeit) zu erkennen, zu verstehen und/oder zu akzeptieren?"
        type: yesno
      - id: kap31_hierarchien_anmerkungen
        text: "Hier können Sie beschreiben, ob/inwiefern Sie Probleme mit Hierarchien haben:"
        type: textarea
      - id: kap31_abstand
        text: "Können Sie zu anderen Personen intuitiv einen angemessenen Abstand finden/einhalten (z. B. gilt es als angemessen, zu guten Freunden einen anderen körperlichen Abstand zu halten als zu Personen, die man nicht oder weniger gut kennt)?"
        type: yesno
      - id: kap31_abstand_anmerkungen
        text: "Hier können Sie genauer darstellen, ob/inwiefern Sie zu anderen Personen intuitiv einen angemessenen Abstand halten können:"
        type: textarea
      - id: kap31_oversharing
        text: "Können Sie korrekt einschätzen, mit welchen Personen Sie welche Themen besprechen sollten / nicht besprechen sollten? (Stichwort: „Oversharing\")"
        type: yesno
      - id: kap31_oversharing_anmerkungen
        text: "Hier können Sie genauer erklären, ob/inwiefern Sie einschätzen können, mit welchen Personen Sie welche Themen besprechen sollten / nicht besprechen sollten:"
        type: textarea
      - id: kap31_kontakt_aufnehmen
        text: "Wenn Sie zu Personen, die Ihnen (eher) fremd sind, Kontakt aufnehmen möchten oder müssen (z. B. per Telefon, Mail oder im echten Leben): Wissen Sie dann, wie Sie das anstellen können / was Sie sagen sollen oder dürfen?"
        type: yesno
      - id: kap31_kontakt_aufnehmen_anmerkungen
        text: "Hier können Sie beschreiben, ob/inwiefern es Ihnen Probleme bereitet, wenn Sie zu anderen Personen Kontakt aufnehmen müssen:"
        type: textarea
      - id: kap31_mails_telefonieren
        text: "Fällt Ihnen das Verfassen von Mails oder das Telefonieren leichter?"
        type: choice
        options:
          - "Mails"
          - "Telefonieren"
      - id: kap31_mails_telefonieren_anmerkungen
        text: "Hier können Sie beschreiben, was Ihnen beim Verfassen von Mails und/oder beim Telefonieren Schwierigkeiten bereitet / leichtfällt:"
        type: textarea
      - id: kap31_gespraech_weiterfuehren
        text: "Wenn Sie mit einer Person sprechen: Fällt es Ihnen dann schwer, das Gespräch weiterzuführen („Ja\" bedeutet also prinzipiell: Gespräche brechen regelmäßig plötzlich ab, weil Sie nicht wissen, was Sie sagen sollen)."
        type: yesno
      - id: kap31_gespraech_aufrechterhalten_anmerkungen
        text: "Hier können Sie beschreiben, ob Sie wissen, wie Sie ein Gespräch aufrechterhalten können, oder was Ihnen beim Aufrechterhalten von Gesprächen Schwierigkeiten bereitet:"
        type: textarea
      - id: kap31_monologisieren
        text: "Neigen Sie in Gesprächen dazu, zu monologisieren? Anders gefragt: Neigen Sie dazu, eher einen Vortrag zu halten, als ein „typisches Gespräch\" zu führen, in dem beide Seiten gleichermaßen zu Wort kommen?"
        type: yesno
      - id: kap31_monologisieren_anmerkungen
        text: "Hier können Sie notieren, ob/inwiefern Sie andere Menschen kaum zu Wort kommen lassen, wenn Sie mit ihnen sprechen:"
        type: textarea
      - id: kap31_sprechen_an_der_reihe
        text: "Erkennen Sie in Gesprächen, wann Sie mit dem Sprechen an der Reihe sind? (Unterbrechen Sie andere Menschen versehentlich, wenn diese sprechen, weil Sie denken, dass die andere Person schon fertig erzählt hat?)"
        type: yesno
      - id: kap31_unterbrechen_anmerkungen
        text: "Hier können Sie genauer ausführen, ob/inwiefern Sie andere Menschen beim Sprechen unterbrechen:"
        type: textarea
      - id: kap31_antworten_passen
        text: "Wenn Sie auf die Fragen einer Person antworten: Passt das, was Sie sagen, aus der Sicht anderer Personen zu der Frage, die Ihnen gestellt wurde?"
        type: yesno
      - id: kap31_antworten_passen_anmerkungen
        text: "Hier können Sie beschreiben, inwiefern Ihre Antworten zu den Fragen anderer Personen passen beziehungsweise nicht passen (aus Ihrer Sicht und/oder aus der Sicht von anderen Personen; denken Sie an Rückmeldungen von anderen Personen, z. B. im Arbeitskontext oder beim Kontakt mit der Familie):"
        type: textarea
      - id: kap31_mitteilen
        text: "Wenn Sie etwas sehr Positives, Negatives, Aufregendes, Interessantes etc. erleben: Haben Sie dann das Bedürfnis, dies anderen Personen mitzuteilen?"
        type: yesno
      - id: kap31_mitteilen_anmerkungen
        text: "Hier können Sie beschreiben, ob/inwiefern Sie etwas anderen Personen mitteilen möchten bzw. dies auch tatsächlich tun:"
        type: textarea
      - id: kap31_soziale_interaktionen_zerdenken
        text: "Machen Sie sich über anstehende soziale Interaktionen sehr viele Gedanken/zerdenken Sie solche Situationen? (z. B.: Sie spielen die gesamte Situation immer und immer wieder im Kopf durch, um auf die Situation vorbereitet zu sein)"
        type: yesno
      - id: kap31_zerdenken_anmerkungen
        text: "Hier können Sie näher erläutern, ob/inwiefern Sie solche Situationen zerdenken – nennen Sie ggf. auch gern ein konkretes Beispiel:"
        type: textarea
      - id: kap31_erwachsene_als_kind
        text: "Haben Sie sich als Kind lieber mit erwachsenen Menschen unterhalten als mit gleichaltrigen Kindern? Waren Ihnen als Kind erwachsene Menschen sympathischer als andere, gleichaltrige Kinder?"
        type: yesno
      - id: kap31_erwachsene_als_kind_anmerkungen
        text: "Hier können Sie Ihre Erfahrungen zu diesem Thema genauer darstellen:"
        type: textarea
      - id: kap31_kontakt_juenger_aelter
        text: "Insofern Sie heutzutage mit anderen Menschen Kontakt haben: Sind die Menschen, mit denen Sie sich gut verstehen, deutlich jünger oder älter als Sie?"
        type: yesno
      - id: kap31_kontakt_juenger_aelter_anmerkungen
        text: "Hier können Sie Ihren Kontakt zu anderen Menschen genauer darstellen:"
        type: textarea
      - id: kap31_smalltalk
        text: "Fällt es Ihnen schwer, vermeintlich „einfache Fragen\" zu beantworten (z. B. zum Wetter/zu Ihrem Befinden: „Wie geht es dir heute?\")? Alternative Formulierung dieser Frage: Fällt Ihnen Small-Talk schwer?"
        type: yesno
      - id: kap31_smalltalk_anmerkungen
        text: "Hier können Sie genauer darstellen, was Ihnen Schwierigkeiten bereitet / was Ihnen gut gelingt:"
        type: textarea
      - id: kap31_sprechen_frueh_spaet
        text: "Haben Sie als Kind auffällig früh oder spät mit dem Sprechen angefangen?"
        type: yesno
      - id: kap31_sprachentwicklung
        text: "Hier können Sie notieren, wie sich Ihre Sprachfähigkeiten in der Kindheit entwickelt haben:"
        type: textarea
      - id: kap31_wortwahl
        text: "Neigen Sie dazu, beim Sprechen eine andere Wortwahl als die meisten anderen Menschen zu benutzen? (z. B.: Sprechen Sie besonders gehoben/ähnelt Ihre Sprechsprache eher der Schriftsprache?)"
