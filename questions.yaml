        text: "Hier können Sie Anmerkungen zu Ihrem Erleben von Meltdowns notieren:"
        type: textarea
      - id: kap4_shutdown
        text: "Kann es passieren, 1) dass Sie nicht mehr sprechen können, 2) dass Sie sich (wippend) in Embryonalstellung zusammenbrechen oder 3) dass Sie sich (wippend) in Embryonalstellung begeben, wenn zu viele Reize auf Sie einwirken und/oder diese Reize zu intensiv sind? (= Haben Sie in solchen Situationen einen Shutdown?)"
