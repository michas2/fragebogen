        text: "Hier können Sie weitere Anmerkungen zum Thema Ungeschicklichkeit notieren:"
        type: textarea
      - id: kap4_leistungsbereiche
        text: "Sind Sie in einigen Leistungsbereichen besonders gut und in anderen Leistungsbereichen hingegen sehr schlecht (z. B.: Sie können sehr gut Mangas zeichnen, können sich die Schuhe aber nicht selbständig zubinden)?"
